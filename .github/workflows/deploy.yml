name: FINAL STEP 2 PIPELINE

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/srefinal-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image.outputs.tag }}

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set image tag
      id: image
      run: |
        TAG=latest-${{ github.sha }}
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Image will be tagged as: $TAG"

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-to-cluster:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Verify cluster connection
      run: kubectl cluster-info

    - name: Update deployment image
      run: |
        kubectl set image deployment/srefinal-app \
          srefinal-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }} \
          -n srefinal-prod || true

    - name: Apply deployment manifests
      run: |
        kubectl apply -f deployment.yaml

    - name: Check rollout status
      run: |
        kubectl rollout status deployment/srefinal-app -n srefinal-prod --timeout=5m

    - name: Verify deployment
      run: |
        kubectl get deployments,pods,services -n srefinal-prod