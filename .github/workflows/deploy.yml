name: srefinal CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Пайплайн запускается при каждом пуше в ветку main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/srefinal-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Выполняем шаг: Automatically build Docker images
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Выполняем шаг: Push images to a registry (Авторизация в GitHub Packages)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short

      # Собираем и пушим образ с уникальным тегом (хэшем коммита)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    # Этот шаг будет выполняться на твоем компе через локальный раннер
    runs-on: self-hosted 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Выполняем шаг: Automatically deploy updates to the cluster
      - name: Deploy to Local Kubernetes Cluster
        run: |
          # Динамически подставляем новый тег образа в манифест и катим в кластер
          $IMAGE = "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          (Get-Content ./k8s/deployment.yaml) -replace 'image: srefinal-app:v1', "image: $IMAGE" | Set-Content ./k8s/deployment.yaml
          kubectl apply -f ./k8s/ -n srefinal-prod