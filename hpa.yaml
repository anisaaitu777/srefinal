apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: srefinal-hpa
  namespace: srefinal-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: srefinal-app
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 10 # Поставим очень маленький порог, чтобы он легко триггерился